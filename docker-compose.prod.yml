version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: avocado_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-avocado}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: avocado_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  api:
    image: ghcr.io/<YOUR_GITHUB_USERNAME>/avocado-api:latest
    container_name: avocado_api
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-avocado}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-me}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-123456}
    ports:
      - "3000:3000"
    restart: always

  frontend:
    image: ghcr.io/<YOUR_GITHUB_USERNAME>/avocado-frontend:latest
    container_name: avocado_frontend
    depends_on:
      - api
    ports:
      - "80:80"
    restart: always

volumes:
  postgres_data:
  redis_data:
